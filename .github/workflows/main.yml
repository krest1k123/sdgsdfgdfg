name: Build C++ DLL

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Show solution files
        shell: pwsh
        run: |
          Get-ChildItem -Path . -Filter *.sln -Recurse | Select-Object FullName

      - name: Build solution
        shell: cmd
        run: msbuild darkside_sdk.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Upload DLL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darkside_sdk-release
          path: output\Release\*.dll
          if-no-files-found: error
