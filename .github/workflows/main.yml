name: Build DLL

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Find Solution
        shell: powershell
        run: |
          $sln = Get-ChildItem -Recurse -Filter *.sln | Select-Object -First 1

          if (-not $sln) {
            Write-Error "No .sln file found in the repository."
            exit 1
          }

          Write-Host "Found solution: $($sln.FullName)"
          "SOLUTION=$($sln.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build Solution
        shell: powershell
        run: |
          msbuild "$env:SOLUTION" /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:VisualStudioVersion=17.0

      - name: Find Build Output
        shell: powershell
        run: |
          Get-ChildItem -Recurse -Filter *.dll | Select-Object FullName

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dll-build
          path: |
            **/x64/Release/*.dll
            **/Release/*.dll
            **/output/Release/*.dll
          if-no-files-found: error
