name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install dependencies
      shell: powershell
      run: |
        git clone --depth 1 https://github.com/protocolbuffers/protobuf.git deps/protobuf
        git clone --depth 1 https://github.com/freetype/freetype.git deps/freetype

        cmake -S deps/protobuf/cmake -B deps/protobuf/build `
          -Dprotobuf_BUILD_TESTS=OFF `
          -Dprotobuf_BUILD_SHARED_LIBS=OFF

        cmake --build deps/protobuf/build --config Release

        cmake -S deps/freetype -B deps/freetype/build `
          -DFT_DISABLE_HARFBUZZ=ON

        cmake --build deps/freetype/build --config Release

    - name: Fix project paths
      shell: powershell
      run: |
        $proj = Get-ChildItem -Recurse *.vcxproj | Select -First 1
        
        # Читаем весь файл в память как одну строку
        $content = Get-Content $proj.FullName -Raw
        
        # Делаем замену и сохраняем обратно с правильной кодировкой UTF-8
        $content -replace '\\directx\\directx.cpp','directx\directx.cpp' | Set-Content $proj.FullName -Encoding UTF8

    - name: Build
      shell: powershell
      env:
        # Устанавливаем пути через переменные окружения, чтобы избежать ошибки MSB1006
        INCLUDE: "${{ github.workspace }}\\deps\\protobuf\\src;${{ github.workspace }}\\deps\\freetype\\include;${env:INCLUDE}"
        LIB: "${{ github.workspace }}\\deps\\protobuf\\build\\Release;${{ github.workspace }}\\deps\\freetype\\build\\Release;${env:LIB}"
      run: |
        $sln = Get-ChildItem -Recurse *.sln | Select -First 1

        msbuild $sln.FullName `
          /m `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:PlatformToolset=v143 `
          /p:VisualStudioVersion=17.0

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: dll-build
        path: |
          **/Release/*.dll
