name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Fix project paths
      shell: powershell
      run: |
        # Прямая замена кривого пути в vcxproj без поиска файлов
        (Get-Content darkside_sdk\darkside_sdk.vcxproj) -replace '\\directx\\directx.cpp','directx\directx.cpp' | Set-Content darkside_sdk\darkside_sdk.vcxproj

    - name: Build
      run: msbuild darkside_sdk.sln /m /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:VisualStudioVersion=17.0

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: dll-build
        path: "**/Release/*.dll"
