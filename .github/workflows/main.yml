name: Build DLL

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install dependencies
      shell: pwsh
      run: |
        git clone --depth 1 https://github.com/protocolbuffers/protobuf.git deps/protobuf
        git clone --depth 1 https://github.com/freetype/freetype.git deps/freetype

        cmake -S deps/protobuf/cmake -B deps/protobuf/build `
          -Dprotobuf_BUILD_TESTS=OFF `
          -Dprotobuf_BUILD_SHARED_LIBS=OFF

        cmake --build deps/protobuf/build --config Release

        cmake -S deps/freetype -B deps/freetype/build `
          -DFT_DISABLE_HARFBUZZ=ON

        cmake --build deps/freetype/build --config Release

    - name: Fix project paths
      shell: pwsh
      run: |
        # Ищем файл .vcxproj только вашего проекта, игнорируя сгенерированные файлы в deps
        $proj = Get-ChildItem -Recurse *.vcxproj | Where-Object { $_.FullName -notmatch 'deps' } | Select -First 1

        if ($proj) {
            Write-Host "Working on project file: $($proj.FullName)"
            $content = Get-Content $proj.FullName -Raw
            
            # Заменяем все ошибочные пути вида \directx\ на относительные directx\ везде в проекте
            $content = $content -replace '\\directx\\', 'directx\'
            
            Set-Content $proj.FullName $content -Encoding UTF8
            Write-Host "Successfully patched project paths."
        } else {
            Write-Error "Main .vcxproj file not found outside of 'deps'!"
            exit 1
        }

    - name: Build
      shell: pwsh
      run: |
        # Ищем файл решения .sln только вашего проекта, игнорируя deps
        $sln = Get-ChildItem -Recurse *.sln | Where-Object { $_.FullName -notmatch 'deps' } | Select -First 1

        if (-not $sln) {
            Write-Error "Main Solution file (.sln) not found!"
            exit 1
        }

        Write-Host "Building solution: $($sln.FullName)"

        # Настраиваем переменные окружения процесса для компилятора cl.exe и линкера link.exe
        $env:INCLUDE = "${{ github.workspace }}\deps\protobuf\src;${{ github.workspace }}\deps\freetype\include;" + $env:INCLUDE
        $env:LIB = "${{ github.workspace }}\deps\protobuf\build\Release;${{ github.workspace }}\deps\freetype\build\Release;" + $env:LIB

        # Чтобы передать пути со знаком ";" внутрь аргументов командной строки msbuild, 
        # точку с запятой ОБЯЗАТЕЛЬНО нужно экранировать через URL-кодирование как "%3b".
        # Иначе MSBuild падает с ошибкой MSB1006.
        $IncludePaths = "${{ github.workspace }}\deps\protobuf\src%3b${{ github.workspace }}\deps\freetype\include"
        $LibraryPaths = "${{ github.workspace }}\deps\protobuf\build\Release%3b${{ github.workspace }}\deps\freetype\build\Release"

        msbuild $sln.FullName `
          /m `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:PlatformToolset=v143 `
          /p:VisualStudioVersion=17.0 `
          "/p:IncludePath=$IncludePaths%3b`$(IncludePath)" `
          "/p:LibraryPath=$LibraryPaths%3b`$(LibraryPath)"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: dll-build
        path: |
          **/Release/*.dll
