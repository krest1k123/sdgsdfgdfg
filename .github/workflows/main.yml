name: Build DarkSide SDK DLL

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Fix paths before build
      shell: pwsh
      run: |
        $proj = "darkside_sdk/darkside_sdk.vcxproj"
        (Get-Content $proj) -replace 'freetype', 'freetypes' | Set-Content $proj
        (Get-Content $proj) -replace '<ClCompile Include="/', '<ClCompile Include="' | Set-Content $proj

    - name: Build Release x64
      run: |
        msbuild darkside_sdk.sln /p:Configuration=Release /p:Platform=x64 /m /v:minimal

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: DarkSide-DLL-x64
        path: output/Release/*.dll
